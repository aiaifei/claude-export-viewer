<!doctype html>
<meta charset="utf-8">
<title>Claude 数据导出查看器</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  :root{
    --bg:#f5f4ef; --panel:#fff; --ink:#1f1e1c; --muted:#6b6862; --line:#e6e3dc;
    --accent:#cc6b3f; --accent-weak:#f3e6dd; --human:#2563eb; --human-bg:#eef3fd;
    --asst-bg:#faf9f5; --code-bg:#1f1e1c; --code-ink:#e8e6e0;
    /* Claude widget design tokens — let inline SVGs that reference them render in color */
    --color-background-primary:#fff;--color-background-secondary:#f5f4ef;--color-background-tertiary:#ece9e2;
    --color-text-primary:#1f1e1c;--color-text-secondary:#6b6862;--color-text-tertiary:#908d86;
    --color-text-success:#3c8a4e;--color-text-danger:#c0392b;--color-text-warning:#b8860b;--color-text-accent:#cc6b3f;
    --color-border-primary:#d9d5cc;--color-border-secondary:#e6e3dc;--color-border-tertiary:#ece9e2;
    --color-success:#3c8a4e;--color-danger:#c0392b;--color-warning:#b8860b;--color-accent:#cc6b3f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);background:var(--bg)}
  /* layout */
  .app{display:grid;grid-template-columns:340px 1fr;height:100vh;overflow:hidden}
  .sidebar{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
  .main{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
  /* header / loader */
  .brand{display:flex;align-items:center;gap:9px;padding:16px 16px 12px;border-bottom:1px solid var(--line)}
  .star{width:22px;height:22px;flex:0 0 auto}
  .brand b{font-size:16px}
  .brand span{color:var(--muted);font-size:12px;margin-left:auto}
  .loadbar{padding:8px 12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
  .drop{display:flex;align-items:center;justify-content:center;gap:7px;border:1.5px dashed var(--line);
    border-radius:8px;padding:8px 10px;text-align:center;color:var(--muted);cursor:pointer;transition:.15s;
    font-size:12.5px;background:var(--bg);line-height:1.2}
  .drop:hover,.drop.hot{border-color:var(--accent);color:var(--accent);background:var(--accent-weak)}
  .drop b{color:var(--ink);font-size:13px;font-weight:600}
  .drop.hot b{color:var(--accent)}
  .drop .dropico{flex:0 0 auto;width:15px;height:15px}
  .drop .dropsub{font-size:11px;opacity:.7}
  .loadrow{display:flex;gap:6px;align-items:stretch}
  .search{flex:1;min-width:0;padding:7px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:13px;background:var(--bg)}
  .search:focus{outline:none;border-color:var(--accent)}
  .stats{display:flex;gap:6px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
  .pill{background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 9px;white-space:nowrap}
  .pill b{color:var(--ink)}
  /* list */
  .list{overflow:auto;flex:1}
  .item{padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;cursor:pointer;background:var(--bg);transition:.1s}
  .item:hover{border-color:var(--accent);background:var(--accent-weak)}
  .item.sel{border-color:var(--accent);background:var(--accent-weak);box-shadow:inset 3px 0 0 var(--accent)}
  .item .t{font-weight:600;font-size:14px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .m{color:var(--muted);font-size:12px;display:flex;gap:8px;flex-wrap:wrap}
  .item .snip{color:var(--muted);font-size:12px;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;
    -webkit-box-orient:vertical;overflow:hidden}
  /* sort row */
  .sortrow{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid var(--line);font-size:12px;align-items:center}
  .sortrow span{color:var(--muted)}
  .sortrow button{font:inherit;font-size:12px;border:1px solid var(--line);background:var(--bg);border-radius:6px;
    padding:3px 9px;cursor:pointer;color:var(--muted)}
  .sortrow button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* conversation view */
  .convhead{padding:16px 22px;border-bottom:1px solid var(--line);background:var(--panel);flex:0 0 auto}
  .convtop{display:flex;align-items:center;gap:12px}
  .convtop h2{margin:0;font-size:18px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .convexport{display:flex;gap:8px;flex:0 0 auto}
  .expbtn{font:inherit;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--bg);
    border-radius:7px;padding:6px 12px;cursor:pointer;color:var(--ink);white-space:nowrap}
  .expbtn:hover{background:#efece4;border-color:var(--accent)}
  .expbtn.pdf{background:var(--accent);color:#fff;border-color:var(--accent)}
  .expbtn.pdf:hover{background:#b85a30}
  .convsearch{display:flex;align-items:center;gap:8px;margin-top:12px}
  /* when the main panel is showing a project (not a chat), hide chat-only controls */
  #convwrap.projmode .convexport,#convwrap.projmode .convsearch,#convwrap.projmode #scrollnav{display:none}
  #convwrap.projmode .convmeta-proj{color:var(--muted);font-size:12px;display:flex;gap:14px;flex-wrap:wrap}
  .csearchin{flex:1;min-width:0;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font:inherit;background:var(--bg)}
  .csearchin:focus{outline:none;border-color:var(--accent)}
  .csearchbtn{font:inherit;font-size:14px;font-weight:500;border:1px solid var(--accent);background:var(--accent);
    color:#fff;border-radius:8px;padding:9px 18px;cursor:pointer;flex:0 0 auto}
  .csearchbtn:hover{background:#b85a30}
  .csearchcount{font-size:12px;color:var(--muted);min-width:44px;text-align:center;flex:0 0 auto}
  .snbtn.sm{width:34px;height:34px}
  mark.cur{background:#ff9a3d;color:#fff}
  mark.csearch{background:#ffe08a;color:inherit;border-radius:2px;padding:0 1px}
  mark.csearch.cur{background:#ff9a3d;color:#fff}
  .statsbtn{font:inherit;font-size:12.5px;font-weight:500;border:1px solid var(--line);background:var(--bg);
    border-radius:8px;padding:7px 10px;cursor:pointer;color:var(--ink);white-space:nowrap;flex:0 0 auto}
  .statsbtn:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent)}
  .statsbtn:disabled{opacity:.5;cursor:default}
  .statspage{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column}
  .statshead{display:flex;align-items:center;gap:14px;padding:16px 28px;border-bottom:1px solid var(--line);
    background:var(--panel);flex:0 0 auto}
  .statshead h2{margin:0;font-size:19px}
  .statsbackbtn{font:inherit;font-size:14px;font-weight:500;border:1px solid var(--accent);background:var(--accent);
    color:#fff;border-radius:8px;padding:8px 16px;cursor:pointer;flex:0 0 auto}
  .statsbackbtn:hover{background:#b85a30}
  .statssub{color:var(--muted);font-size:13px;margin-left:auto}
  .statsbody{flex:1;overflow:auto;padding:28px;max-width:1100px;margin:0 auto;width:100%}
  .statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
  .statcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .statcard .num{font-size:28px;font-weight:700;color:var(--accent);line-height:1.1}
  .statcard .lbl{font-size:13px;color:var(--muted);margin-top:4px}
  .statsec{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:22px}
  .statsec h3{margin:0 0 16px;font-size:15px}
  .barrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .barrow .bl{flex:0 0 130px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .barrow .bt{flex:1;background:var(--bg);border-radius:5px;height:20px;position:relative;overflow:hidden}
  .barrow .bf{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#cc6b3f,#e08a5f);border-radius:5px}
  .barrow .bv{flex:0 0 auto;color:var(--muted);font-size:12px;min-width:36px;text-align:right}
  .wordcloud{display:flex;flex-wrap:wrap;gap:8px 12px;align-items:baseline;line-height:1.8}
  .wordcloud .w{color:var(--accent);font-weight:500}
  .ranklist{counter-reset:r}
  .rankrow{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .rankrow:last-child{border-bottom:0}
  .rankrow .rn{flex:0 0 26px;height:26px;border-radius:50%;background:var(--accent-weak);color:var(--accent);
    font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
  .rankrow .rt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .rankrow .rt:hover{color:var(--accent);text-decoration:underline}
  .rankrow .rc{color:var(--muted);font-size:12px}
  /* ---- iterated stats page: tabs + dense layout ---- */
  .stabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:0}
  .stab{font:inherit;font-size:13.5px;font-weight:600;color:var(--muted);background:none;border:0;
    border-bottom:2px solid transparent;padding:8px 14px 10px;cursor:pointer;margin-bottom:-1px;transition:.12s}
  .stab:hover{color:var(--ink)}
  .stab.on{color:var(--accent);border-bottom-color:var(--accent)}
  .spane.hide{display:none}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.twocol{grid-template-columns:1fr}}
  .twocol .statsec{margin-bottom:0}
  .h3sub{font-weight:400;color:var(--muted);font-size:12px}
  .subh{font-size:12px;color:var(--muted);margin-bottom:7px}
  /* compact override: tighter cards + sections for higher info density */
  .statgrid{grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px;margin-bottom:20px}
  .statcard{padding:13px 14px;border-radius:10px}
  .statcard .num{font-size:23px}
  .statcard .lbl{font-size:12px}
  .statsec{padding:16px 18px;margin-bottom:18px}
  .statsec h3{margin:0 0 13px;font-size:14.5px}
  /* mini stat grid (interaction efficiency) */
  .minigrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .minicard{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:11px 12px}
  .minicard .mn{font-size:19px;font-weight:700;color:var(--accent);line-height:1.1}
  .minicard .ml{font-size:11.5px;color:var(--muted);margin-top:3px}
  /* donut */
  .donutwrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .donutsvg{width:140px;height:140px;flex:0 0 auto}
  .lglist{flex:1;min-width:160px;display:flex;flex-direction:column;gap:6px}
  .lgrow{display:flex;align-items:center;gap:8px;font-size:12.5px}
  .lgdot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .lgname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lgval{color:var(--muted);font-size:12px;flex:0 0 auto}
  /* split bar */
  .splitbar{display:flex;height:24px;border-radius:6px;overflow:hidden;background:var(--bg)}
  .sbseg{display:block;height:100%}
  .splitleg{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px;font-size:12.5px}
  .sblg{display:flex;align-items:center;gap:6px}
  /* weekday strip */
  .wdstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .wdcell{text-align:center}
  .wdbox{height:46px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
  .wdlbl{font-size:11px;color:var(--muted);margin-top:4px}
  .projsec{border-bottom:1px solid var(--line);padding:10px 14px 12px;flex:0 0 auto;max-height:30vh;overflow:auto}
  .projhd{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
  /* collapsible top-level sections (Projects / Chats / Design) */
  .navsec{border-bottom:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .navsec.open{flex:1 1 auto;overflow:hidden}
  .navsec.closed{flex:0 0 auto}
  .navhd{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;user-select:none;
    font-size:13px;font-weight:700;color:var(--ink);background:var(--panel);transition:.12s}
  .navhd:hover{background:var(--bg)}
  .navhd .chev{flex:0 0 auto;width:14px;height:14px;color:var(--muted);transition:transform .18s}
  .navsec.open .navhd .chev{transform:rotate(90deg)}
  .navhd .nicon{flex:0 0 auto;width:17px;height:17px;color:var(--accent);display:flex;align-items:center}
  .navhd .nicon svg{width:17px;height:17px;display:block}
  .navhd .ntitle{flex:1;min-width:0}
  .navhd .ncount{flex:0 0 auto;font-size:11px;font-weight:600;color:var(--muted);background:var(--bg);
    border:1px solid var(--line);border-radius:999px;padding:1px 8px;min-width:20px;text-align:center}
  .navbody{overflow:auto;flex:1 1 auto;min-height:0}
  .navsec.closed .navbody{display:none}
  .navempty{padding:14px 16px;color:var(--muted);font-size:12px}
  .projitem{padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;cursor:pointer;background:var(--bg)}
  .projitem:hover{border-color:var(--accent);background:var(--accent-weak)}
  .projitem.sel{border-color:var(--accent);background:var(--accent-weak);box-shadow:inset 3px 0 0 var(--accent)}
  /* conversations nested under the selected project */
  .projconvs{margin:-2px 0 9px 8px;border-left:2px solid var(--accent-weak);padding-left:8px}
  .projconv-hd{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin:6px 0 6px 3px}
  .projconv{padding:7px 9px;border-radius:7px;cursor:pointer;margin-bottom:4px;background:var(--panel);border:1px solid transparent;transition:.1s}
  .projconv:hover{background:var(--bg);border-color:var(--line)}
  .projconv.sel{background:var(--accent-weak);box-shadow:inset 3px 0 0 var(--accent)}
  .projconv .pct{font-weight:600;font-size:12.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .projconv .pcm{color:var(--muted);font-size:11px;margin-top:2px}
  .projn{font-weight:600;font-size:13px;color:var(--ink)}
  .projd{font-size:12px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .projmeta{font-size:12px;color:var(--muted)}
  .projprompt{font-size:14px;line-height:1.65;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:14px 16px;white-space:normal}
  .projprompt h1,.projprompt h2,.projprompt h3{font-size:15px;margin:12px 0 6px}
  .projprompt pre{background:#1f1e1c;color:#e8e6e0;padding:10px;border-radius:6px;overflow:auto}
  .docitem{padding:9px 0;border-bottom:1px solid var(--line)}
  .docitem:last-child{border-bottom:0}
  .docn{font-weight:600;font-size:13px;margin-bottom:4px}
  /* project: section header with an action button on the right */
  .statsec-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .statsec-hd h3{flex:1;min-width:0}
  /* project: knowledge-file row with download button */
  .docrow{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .docrow .docn{flex:1;min-width:0;margin-bottom:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .docbtns{flex:0 0 auto;display:flex;align-items:center;gap:8px}
  .docsize{font-size:11px;color:var(--muted)}
  .convhead h2{margin:0 0 6px;font-size:18px}
  .convhead .meta{color:var(--muted);font-size:12px;display:flex;gap:14px;flex-wrap:wrap}
  .thread{overflow:auto;flex:1;padding:22px;scroll-behavior:smooth}
  .msg{max-width:820px;margin:0 auto 18px}
  .who{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;display:flex;gap:8px;align-items:center}
  .who .ts{font-weight:400;color:var(--muted);letter-spacing:0;text-transform:none}
  .branchnav{display:inline-flex;align-items:center;gap:4px;margin-left:auto;font-weight:400;letter-spacing:0;text-transform:none}
  .brbtn{font:inherit;font-size:13px;line-height:1;border:1px solid var(--line);background:var(--bg);
    border-radius:5px;padding:1px 6px;cursor:pointer;color:var(--ink)}
  .brbtn:hover:not(:disabled){background:#efece4;border-color:var(--accent)}
  .brbtn:disabled{opacity:.35;cursor:default}
  .brcount{font-size:11px;color:var(--muted);min-width:30px;text-align:center}
  .brlabel{font-size:11px;color:var(--accent);font-weight:500;margin-right:2px}
  .brbanner{font-size:12px;color:#8a6d1f;background:#fcf7e8;border:1px solid #e8d9a8;border-radius:7px;
    padding:6px 10px;margin-bottom:10px}
  .brbanner b{color:#6b5a2a}
  .msgactions{max-width:820px;margin:2px auto 0;padding-left:2px;height:24px;opacity:0;transition:opacity .12s}
  .msg:hover .msgactions{opacity:1}
  .copybtn{display:inline-flex;align-items:center;gap:5px;font:inherit;font-size:12px;color:var(--muted);
    background:none;border:1px solid transparent;border-radius:6px;padding:3px 8px;cursor:pointer}
  .copybtn:hover{background:var(--bg);border-color:var(--line);color:var(--ink)}
  .copybtn.copied{color:#3c8a4e;border-color:#cfe0d6;background:#f3f8f5}
  .copybtn svg{flex:0 0 auto}
  .scrollnav{position:absolute;right:18px;bottom:20px;display:flex;flex-direction:column;gap:8px;z-index:10}
  .snbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--panel);
    color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 10px #00000014;transition:.12s}
  .snbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 14px #cc6b3f44}
  .snbtn:active{transform:translateY(1px)}
  .snbtn.snoff{opacity:.3;pointer-events:none}
  .bubble{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--asst-bg);overflow-wrap:break-word}
  .msg.human .who{color:var(--human)}
  .msg.human .bubble{background:var(--human-bg);border-color:#d6e0f5}
  .bubble p{margin:0 0 10px}.bubble p:last-child{margin:0}
  .bubble pre{background:var(--code-bg);color:var(--code-ink);padding:12px 14px;border-radius:8px;overflow:auto;
    font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;margin:10px 0}
  .bubble code{background:#00000010;padding:1px 5px;border-radius:4px;
    font:.92em ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .bubble pre code{background:none;padding:0}
  .bubble h1,.bubble h2,.bubble h3{margin:14px 0 8px;line-height:1.3}
  .bubble h1{font-size:1.3em}.bubble h2{font-size:1.18em}.bubble h3{font-size:1.05em}
  .bubble ul,.bubble ol{margin:8px 0;padding-left:22px}.bubble li{margin:3px 0}
  .bubble blockquote{border-left:3px solid var(--line);margin:8px 0;padding:2px 0 2px 14px;color:var(--muted)}
  .bubble a{color:var(--accent)}
  .bubble table{width:max-content;max-width:100%;border-collapse:separate;border-spacing:0;margin:14px 0 16px;
    font-size:13.5px;background:#fff;border:1px solid #eadfd3;border-radius:12px;overflow:hidden;
    box-shadow:0 1px 0 #fff inset,0 12px 26px #2b221410}
  .bubble th,.bubble td{border:0;border-right:1px solid #eee5db;border-bottom:1px solid #eee5db;
    padding:9px 13px;text-align:left;vertical-align:top;line-height:1.55}
  .bubble th:last-child,.bubble td:last-child{border-right:0}
  .bubble tr:last-child td{border-bottom:0}
  .bubble th{background:linear-gradient(180deg,#fff7f1 0%,#fff1e8 100%);color:#2b2620;font-weight:750;
    border-bottom-color:#ead7c8;box-shadow:0 1px 0 #ffffffcc inset,0 -1px 0 #ead7c8 inset}
  .bubble tbody tr:nth-child(even) td{background:#fffdfa}
  .bubble tbody tr:hover td{background:#fff4ec}
  .attach{font-size:12px;color:var(--muted);margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .attach .a{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  .think{margin:0 0 12px;border:1px solid #e8d9a8;background:#fcf7e8;border-radius:8px;overflow:hidden}

<script>
const $=s=>document.querySelector(s);
let DATA=[], view=[], sel=null, selProj=null, sortKey="updated", projSortKey="updated", q="";
let _statTab="overview"; // active tab on the stats page
let PROJECTS=[]; // loaded project definitions (from projects/*.json)
let BRANCH_CHOICES={}; // parentUuid -> chosen sibling index, for the open conversation
let CSEARCH={matches:[], idx:-1}; // in-conversation search state

/* ---------- lenient field readers (handle export variations) ---------- */
const pick=(o,keys,d="")=>{for(const k of keys){if(o&&o[k]!=null&&o[k]!=="")return o[k]}return d};
// Parse a date value to a numeric timestamp; return 0 for missing/invalid so sorts stay stable.
const tval=v=>{const t=new Date(v).getTime();return isNaN(t)?0:t};
function hostOfSafe(u){try{return new URL(u).hostname.replace(/^www\./,"")}catch(e){return ""}}
function cssEsc(s){return (window.CSS&&CSS.escape)?CSS.escape(s+""):(s+"").replace(/["\\]/g,"\\$&")}
const convTitle = c => pick(c,["name","title","summary"],"") || "(无标题对话)";
const convCreated = c => pick(c,["created_at","create_time","createdAt"]);
const convUpdated = c => pick(c,["updated_at","update_time","updatedAt"]) || convCreated(c);
const convModel = c => pick(c,["model","model_slug",""]);
const convMsgs = c => pick(c,["chat_messages","messages","chatMessages"],[]) || [];
function msgHasRenderableContent(m){
  if(!m)return false;
  const p=msgParts(m);
  if((p.text||"").trim() || (p.thinking||"").trim())return true;
  if((p.thoughts&&p.thoughts.length) || (p.visuals&&p.visuals.length))return true;
  if((p.files&&p.files.length) || (p.searches&&p.searches.length) || (p.tools&&p.tools.length))return true;
  if(msgUploads(m).length)return true;
  return false;
}
function convDisplayMsgs(c){ return convMsgs(c).filter(msgHasRenderableContent); }
function convDisplayMsgCount(c){ return convDisplayMsgs(c).length; }
function convHasMessages(c){ return convDisplayMsgCount(c) > 0; }
function asArray(v){ return Array.isArray(v)?v:(v!=null?[v]:[]); }
// A conversation's project linkage is not guaranteed in the GDPR export, so read it
// leniently. We try many strategies because different export tools store it differently.
function convProjUuid(c){
  const v=pick(c,["project_uuid","projectUuid","project_id","projectId","projectUUID"],"");
  if(v)return v;
  const p=c&&c.project; if(p&&typeof p==="object")return pick(p,["uuid","id","project_uuid"],"");
  return "";
}
function convProjName(c){
  const p=c&&c.project;
  if(p&&typeof p==="object")return pick(p,["name","title"],"");
  if(typeof p==="string")return p;
  return pick(c,["project_name","projectName"],"");
}
// Collect every UUID-looking value the project object exposes as "its conversations":
// some exports nest a conversations / chat_conversations / chats / uuids array.
function projConvUuidSet(p){
  const set=new Set();
  if(!p||typeof p!=="object")return set;
  for(const key of ["conversations","chat_conversations","chats","conversation_uuids","conversationUuids","uuids"]){
    const arr=p[key];
    if(Array.isArray(arr)){
      for(const x of arr){
        if(typeof x==="string")set.add(x);
        else if(x&&typeof x==="object"){const u=pick(x,["uuid","id","conversation_uuid","conversationId"],""); if(u)set.add(u);}
      }
    }
  }
  return set;
}
// Does any top-level string field of the conversation equal the project's uuid? (catches
// exports that use an unexpected field name like "parent_project" etc.)
function convMentionsUuid(c,uuid){
  if(!uuid||!c||typeof c!=="object")return false;
  for(const k in c){
    const v=c[k];
    if(typeof v==="string" && v===uuid) return true;
    if(v && typeof v==="object" && !Array.isArray(v)){
      for(const k2 in v){ if(typeof v[k2]==="string" && v[k2]===uuid) return true; }
    }
  }
  return false;
}
// Return the conversations belonging to project p, trying (in order): the project's own
// conversation list, a uuid match on the conversation, a deep uuid scan, then a name match.
function convsForProject(p){
  if(!p)return [];
  const uuid=(p.uuid||p.id||"")+"";
  const name=(p.name||"").trim();
  const own=projConvUuidSet(p); // uuids the project itself lists
  return DATA.map((c,_i)=>({c,_i})).filter(({c})=>{
    if(!convHasMessages(c))return false;
    if(c._design)return false; // design chats live in their own section
    const cuid=(pick(c,["uuid","id"],"")+"");
    if(own.size && cuid && own.has(cuid))return true;     // project lists this conversation
    const cu=convProjUuid(c);
    if(uuid&&cu&&cu===uuid)return true;                   // conversation points at project (common fields)
    if(uuid&&convMentionsUuid(c,uuid))return true;        // deep scan for the uuid anywhere
    const cn=(convProjName(c)||"").trim();
    if(name&&cn&&cn===name)return true;                   // name match (last resort)
    return false;
  });
}

// Build the conversation tree from parent_message_uuid and return the linear list of
// messages on the *active* path. Conversations branch when a message is edited or a reply
// is regenerated: siblings share a parent. choices{parentUuid->index} records which sibling
// the user selected at each branch; by default we follow the newest sibling (like the web
// UI showing "2/2"). Each returned message carries _branch={siblings:[uuids], index, parent}
// when it sits at a branch point, so the renderer can draw < n/m > controls.
function activePath(c, choices){
  const msgs=convMsgs(c);
  if(!msgs.length) return [];
  const hasParent=msgs.some(m=>m&&"parent_message_uuid" in m);
  if(!hasParent) return msgs.map(m=>(m._branch=null,m)); // flat conversation, no tree

function firstStringDeep(v, keys){

  if(typeof v==="string")return v;
  if(Array.isArray(v)){
    for(const x of v){const s=firstStringDeep(x,keys); if(s)return s;}
    return "";
  }
  if(typeof v==="object"){
    for(const k of keys){ if(v[k]!=null){const s=firstStringDeep(v[k],keys); if(s)return s;} }
  }
  return "";
}
function shortThoughtFallback(text){

  const first=(s.match(/^(.{8,80}?[。！？.!?])\s/)||s.match(/^(.{8,80}?[。！？.!?])$/)||[])[1]||"";
  if(first && first.length<=80)return first;

}
function thinkingTitle(b,text){

  let raw=pick(b,["summary","title","headline","name","label","caption","thinking_summary","thinkingSummary","summary_text","summaryText"],"");
  if(raw&&typeof raw!=="string")raw=firstStringDeep(raw,keys);

// Returns {kind, code, title, lang} or null. kind ∈ svg|mermaid|html|code|file.
function readArtifact(b){
  if(!b||typeof b!=="object")return null;
  const ty=b.type;
  const nm=(b.name||"")+"";
  const isWidget=/show_widget|visualize|imagine/i.test(nm); // Imagine/Visualize in-line widgets
  // The artifact tool stores the real payload under .input
  const inp = (ty==="tool_use"||ty==="server_tool_use") ? (b.input||{}) : b;
  // mime/type can live in several places
  const mime = (inp.type||inp.mimeType||inp.media_type||b.mime||"")+"";

  let code = inp.widget_code!=null?inp.widget_code
            :inp.content!=null?inp.content

            :inp.code!=null?inp.code
            :inp.svg!=null?inp.svg
            :inp.html!=null?inp.html

  if(/svg\+xml/i.test(mime) || /^<svg[\s>]/i.test(trimmed))            return {kind:"svg",code,title,lang};
  if(/mermaid/i.test(mime))                                            return {kind:"mermaid",code,title,lang};
  if(/^(graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|gantt|pie|erDiagram|journey|mindmap)\b/i.test(trimmed))
                                                                       return {kind:"mermaid",code,title,lang};
  if(/text\/html/i.test(mime) || /vnd\.ant\.react/i.test(mime))        return {kind:"html",code,title,lang};
  // any HTML-ish fragment (starts with a tag), or anything from a visualize widget,
  // is rendered as HTML. widget_code is almost always an HTML fragment that may begin
  // with any element (e.g. <h2 class="sr-only">…), so don't require specific tags.
  if(/^<[a-z!][\s\S]*>/i.test(trimmed) || (isWidget && inp.widget_code!=null))
                                                                       return {kind:"html",code,title,lang};

}

const UPLOADSTORE={};
function uploadKeysFor(name, obj){

  add(name);

function rememberUploadAsset(path, blob, aliases){

  const url=URL.createObjectURL(blob);
  const asset={name, blob, url, mime:blob.type||mimeFor(name), size:blob.size||0};
  for(const k of uploadKeysFor(name,{id:name,uuid:name,file_uuid:name}))UPLOADSTORE[k]=asset;
  if(path)UPLOADSTORE[(path+"").toLowerCase()]=asset;
  for(const alias of asArray(aliases)){
    for(const k of uploadKeysFor(alias,{id:alias,uuid:alias,file_uuid:alias}))UPLOADSTORE[k]=asset;
  }
  return asset;
}
function clearUploadStore(){
  for(const k in UPLOADSTORE){
    try{ if(UPLOADSTORE[k].url)URL.revokeObjectURL(UPLOADSTORE[k].url); }catch(e){}
    delete UPLOADSTORE[k];

}
function lookupUploadAsset(name,obj){

function imageDataUrl(o,name){
  if(!o||typeof o!=="object")return "";
  const source=o.source&&typeof o.source==="object"?o.source:null;
  const mime=o.media_type||o.mime_type||o.mimeType||o.file_type||(source&&(source.media_type||source.mime_type))||mimeFor(name||"image.png");
  const direct=o.url||o.href||o.uri;
  if(typeof direct==="string" && /^(data:image\/|https?:|blob:)/i.test(direct))return direct;
  const vals=[o.data,o.base64,o.file_data,o.image_data,o.bytes,o.content,source&&source.data].filter(v=>typeof v==="string"&&v);
  for(let v of vals){
    if(/^data:image\//i.test(v))return v;
    const compact=v.replace(/\s+/g,"");
    if(compact.length>80 && /^[A-Za-z0-9+/]+={0,2}$/.test(compact))return `data:${mime};base64,${compact}`;
  }

}
// User-uploaded files & attachments live at the message level (not in content[]).
// Some exports include image bytes/base64 or zip asset files; others only include metadata.
function msgUploads(m){
  const out=[];
  const isImg=n=>/\.(png|jpe?g|gif|webp|bmp|svg|heic|tiff?)$/i.test(n||"");
  // attachments: often documents with extracted text
  const atts=Array.isArray(m&&m.attachments)?m.attachments:[];
  for(const a of atts){
    const name=pick(a,["file_name","name","title"],"附件");
    if((a.type||"").toLowerCase()==="skill"){
      out.push({name, kind:"skill", size:0, ftype:"", text:a.content||a.extracted_content||""});
      continue;
    }
    const kind=isImg(name)?"image":"doc";
    const dataUrl=kind==="image"?imageDataUrl(a,name):"";
    const asset=kind==="image"?lookupUploadAsset(name,a):null;
    out.push({name, kind,
      size:a.file_size||0, ftype:a.file_type||"",
      text:kind==="image"?"":(a.extracted_content||a.content||""),
      url:dataUrl||(asset&&asset.url)||"", metaOnly:kind==="image" && !(dataUrl||(asset&&asset.url)) });
  }
  // files: uploaded files, metadata only (image bytes not in export)
  const files=Array.isArray(m&&m.files)?m.files:[];
  for(const f of files){
    const name=pick(f,["file_name","name","title"],"文件");
    const kind=isImg(name)?"image":"file";
    const dataUrl=kind==="image"?imageDataUrl(f,name):"";
    const asset=kind==="image"?lookupUploadAsset(name,f):null;
    out.push({name, kind,
      size:f.file_size||(asset&&asset.size)||0, ftype:f.file_type||(asset&&asset.mime)||"",
      text:kind==="image"?"":(f.extracted_content||""),
      url:dataUrl||(asset&&asset.url)||"", metaOnly:kind==="image" && !(dataUrl||(asset&&asset.url))});
  }
  // non-text content blocks that aren't already handled elsewhere
  const c=m&&m.content;
  if(Array.isArray(c))for(const b of c){
    if(!b||!b.type)continue;
    if(["text","thinking","redacted_thinking","tool_use","server_tool_use","tool_result","web_search_tool_result","web_search_result"].includes(b.type))continue;
    if(b.type==="image"){
      const name=pick(b,["file_name","name","title"],"图片");
      const dataUrl=imageDataUrl(b,name);
      const asset=lookupUploadAsset(name,b);
      out.push({name, kind:"image", size:(asset&&asset.size)||0, ftype:(asset&&asset.mime)||"", url:dataUrl||(asset&&asset.url)||"", metaOnly:!(dataUrl||(asset&&asset.url))});
    }
  }
  // dedupe by filename: the same upload can appear both as an attachment (with extracted
  // text) and as a files[] entry (metadata only). Keep whichever carries more info.
  const byName={};
  for(const u of out){
    const k=u.name;
    if(!byName[k]) byName[k]=u;
    else if((u.url&&!byName[k].url)||(u.text&&!byName[k].text)) byName[k]=u; // prefer recoverable content
  }
  return Object.values(byName);
}

/* ---------- tiny safe markdown renderer ---------- */
function md(src){
  src=src.replace(/\r\n/g,"\n");
  // protect fenced code blocks first
  const blocks=[];
  src=src.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    blocks.push(`<pre><code>${esc(code.replace(/\n$/,""))}</code></pre>`);
    return `\u0000B${blocks.length-1}\u0000`;
  });
  const lines=src.split("\n"); let html="",i=0;
  const inline=t=>esc(t)
    .replace(/`([^`]+)`/g,(_,c)=>`<code>${c}</code>`)
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  while(i<lines.length){
    let l=lines[i];
    if(/^\u0000B\d+\u0000$/.test(l.trim())){html+=l.trim();i++;continue}
    if(/^\s*$/.test(l)){i++;continue}
    let h=l.match(/^(#{1,3})\s+(.*)/);
    if(h){html+=`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`;i++;continue}
    if(/^\s*>/.test(l)){let buf=[];while(i<lines.length&&/^\s*>/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,""));i++}
      html+=`<blockquote>${md(buf.join("\n"))}</blockquote>`;continue}
    if(/^\s*[-*+]\s+/.test(l)){let buf=[];while(i<lines.length&&/^\s*[-*+]\s+/.test(lines[i])){buf.push("<li>"+inline(lines[i].replace(/^\s*[-*+]\s+/,""))+"</li>");i++}
      html+="<ul>"+buf.join("")+"</ul>";continue}
    if(/^\s*\d+\.\s+/.test(l)){let buf=[];while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){buf.push("<li>"+inline(lines[i].replace(/^\s*\d+\.\s+/,""))+"</li>");i++}
      html+="<ol>"+buf.join("")+"</ol>";continue}
    // table: a row containing '|' followed by a separator row like |---|:--:|---|
    if(l.indexOf("|")>=0 && i+1<lines.length && /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(lines[i+1])){
      const splitRow=r=>{let s=r.trim();if(s.startsWith("|"))s=s.slice(1);if(s.endsWith("|"))s=s.slice(0,-1);
        return s.split("|").map(c=>c.trim())};
      const aligns=splitRow(lines[i+1]).map(c=>{const L=c.startsWith(":"),R=c.endsWith(":");
        return R&&L?"center":R?"right":L?"left":""});
      const head=splitRow(l); i+=2;
      const body=[];
      while(i<lines.length && lines[i].indexOf("|")>=0 && !/^\s*$/.test(lines[i])){body.push(splitRow(lines[i]));i++}
      const th=head.map((c,ci)=>`<th${aligns[ci]?` style="text-align:${aligns[ci]}"`:""}>${inline(c)}</th>`).join("");
      const trs=body.map(r=>"<tr>"+r.map((c,ci)=>`<td${aligns[ci]?` style="text-align:${aligns[ci]}"`:""}>${inline(c)}</td>`).join("")+"</tr>").join("");
      html+=`<table><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`;
      continue;
    }
    // paragraph (gather until blank)
    let buf=[l];i++;
    while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^(#{1,3}\s|\s*[-*+]\s|\s*\d+\.\s|\s*>)/.test(lines[i])&&!/^\u0000B\d+\u0000$/.test(lines[i].trim())&&lines[i].indexOf("|")<0){buf.push(lines[i]);i++}
    html+=`<p>${inline(buf.join("\n")).replace(/\n/g,"<br>")}</p>`;
  }
  return html.replace(/\u0000B(\d+)\u0000/g,(_,n)=>blocks[n]);
}
function hl(html,term){ // highlight search term in already-rendered html (text nodes only)
  if(!term)return html;

// Convert inline citation markers (\u0001CITE<url>\u0002<title>\u0003) into small
// clickable source chips that sit at the end of the cited sentence.
// Turn a hostname into a short, clean site label like the web UI shows
// (zhuanlan.zhihu.com -> Zhihu, www.51ldb.com -> 51ldb, www.stcn.com -> STCN).
function siteLabel(host){
  if(!host)return "来源";
  const known={"zhihu.com":"Zhihu","51ldb.com":"51ldb","stcn.com":"STCN","baidu.com":"百度",
    "weixin.qq.com":"微信","mp.weixin.qq.com":"微信","sina.com.cn":"新浪","163.com":"网易",
    "sohu.com":"搜狐","ifeng.com":"凤凰","36kr.com":"36氪","csdn.net":"CSDN","jianshu.com":"简书",
    "github.com":"GitHub","wikipedia.org":"维基","reddit.com":"Reddit","youtube.com":"YouTube",
    "twitter.com":"Twitter","x.com":"X","medium.com":"Medium"};
  // strip common subdomains, then match the registrable-ish base
  const bare=host.replace(/^(www|zhuanlan|mp|m|blog|news|zhidao|baike)\./,"");
  for(const k in known){ if(host===k||host.endsWith("."+k)||bare===k) return known[k]; }
  // otherwise: take the second-level label, capitalize first letter
  const parts=bare.split(".");
  const base=parts.length>=2?parts[parts.length-2]:parts[0];
  return base.charAt(0).toUpperCase()+base.slice(1);
}
function citeChips(html){
  return html.replace(/\u0001CITE(.*?)\u0002(.*?)\u0003/g,(_,url,ttl)=>{
    url=decodeURIComponent(url); ttl=decodeURIComponent(ttl);
    const host=hostOfSafe(url);
    const label=siteLabel(host);

    const card=`<span class="citecard">${esc(full)}${host?`<span class="citehost">${esc(host)}</span>`:""}</span>`;

      : `<span class="cite">${esc(label)}${card}</span>`;
  });
}

function ingest(raw, opts){
  const silent = opts && opts.silent;
  const warn = (m)=>{ if(!silent) alert(m); };
  let json; try{json=JSON.parse(raw)}catch(e){warn("解析失败：这不是有效的 JSON 文件。\n"+e.message);return}
  // Classify the file: it can be (a) conversations.json [array of chats], (b) a single
  // project object, (c) an array of project objects, or (d) a design_chat object.
  const arr = Array.isArray(json) ? json : (json.conversations||json.data||null);
  // project file? (single object with prompt_template, or array of such)
  if(isProjectObj(json) || (Array.isArray(json) && json.length && json.every(isProjectObj))){
    const ps = Array.isArray(json)?json:[json];
    let added=0;
    for(const p of ps){ if(!PROJECTS.some(x=>x.uuid===p.uuid)){PROJECTS.push(p);added++;} }
    renderProjects(); refreshSections();
    if(!DATA.length){ // no conversations loaded yet — show a hint instead of empty list
      $("#empty").innerHTML='<div class="emptybox">已加载 '+added+' 个项目，见左侧「Projects」。<br>如需查看对话，请再拖入 conversations.json。</div>';
    }
    return;
  }
  // design_chat file? (has messages with role/content)
  if(json && Array.isArray(json.messages) && json.messages.length && ("role" in json.messages[0])){
    const conv = designChatToConv(json);
    if(!DATA.some(c=>c.uuid===conv.uuid)) DATA.push(conv);
    afterDataLoaded(); return;
  }
  // otherwise: conversations export
  if(!Array.isArray(arr)||!arr.length){warn("没有找到对话或项目。\n请确认拖入的是 conversations.json 或 projects 文件夹里的 .json。");return}
  // merge (so loading conversations after projects keeps both)

function designToolBlockToContent(b){

function designContentToBlocks(raw){
  if(Array.isArray(raw))return raw;
  if(typeof raw==="string")return [{type:"text",text:raw}];
  if(!raw||typeof raw!=="object")return [];
  const blocks=[];
  const main=raw.content!=null ? raw.content : raw.text;
  if(typeof main==="string" && main.length)blocks.push({type:"text",text:main});
  for(const b of asArray(raw.contentBlocks)){
    if(!b||typeof b!=="object")continue;
    if(b.type==="tool_call"){
      const tb=designToolBlockToContent(b); if(tb)blocks.push(tb);
    }else if(b.type==="thinking"||b.type==="redacted_thinking"){
      const t=b.text||b.thinking||"";

    }else if((b.type==="text"||b.type==null) && !main && typeof b.text==="string"){
      blocks.push({type:"text",text:b.text});
    }
  }
  return blocks;
}

function apply(){
  const term=q.toLowerCase();
  view=DATA.map((c,_i)=>({c,_i})).filter(({c})=>{
    if(!convHasMessages(c))return false;
    if(!term)return true;
    if(convTitle(c).toLowerCase().includes(term))return true;
    return convDisplayMsgs(c).some(m=>msgText(m).toLowerCase().includes(term));
  });
  view.sort((A,B)=>{
    if(sortKey==="msgs")return convDisplayMsgCount(B.c)-convDisplayMsgCount(A.c);
    const k=sortKey==="created"?convCreated:convUpdated;
    return tval(k(B.c))-tval(k(A.c));
  });
  drawList();
}
function snippet(c){
  const term=q.toLowerCase();
  if(term){for(const m of convDisplayMsgs(c)){const t=msgText(m);const k=t.toLowerCase().indexOf(term);
    if(k>=0){const s=Math.max(0,k-30);return (s>0?"…":"")+t.slice(s,k+term.length+50).replace(/\s+/g," ")+"…"}}}
  const first=convDisplayMsgs(c).map(msgText).find(Boolean)||"";
  return first.replace(/```[\s\S]*?```/g," [代码] ").replace(/\s+/g," ").slice(0,120);
}

const KNOWN_COLOR_CLASSES=new Set(["c-gray","c-neutral","c-coral","c-accent","c-primary","c-orange",
  "c-teal","c-cyan","c-mint","c-green","c-success","c-red","c-danger","c-blue","c-info",
  "c-yellow","c-warning","c-purple","c-violet","c-pink","c-track","bar","highlight",
  "link","edge","connector","flow","arrow","arrow-line","line","conn","path-link",
  "arr","arrows","branch","joint","arrowhead","arrow-head","marker","axis","grid","gridline",
  "t","th","ts","tl","label","lbl","sub","muted","caption","desc","title","heading","head"]);
const FALLBACK_PALETTE=["#e7e3da","#dce8ea","#e8e0ec","#e9e4d6","#dde9e0","#ece0db","#dde3ec"];
// For any class we don't recognise, generate a safe rule so the shape never falls back
// to solid black. Connector-ish names (line/edge/path/...) get a stroke-only rule;
// everything else gets a soft neutral fill.
function fallbackCss(code){
  const found=new Set();
  const re=/class\s*=\s*["']([^"']+)["']/g; let m;
  while((m=re.exec(code))){
    m[1].split(/\s+/).forEach(cl=>{
      if(/^[a-z][a-z0-9_-]*$/i.test(cl) && !KNOWN_COLOR_CLASSES.has(cl)) found.add(cl);
    });
  }
  if(!found.size) return "";
  let css="\n/* auto fallback for unrecognised classes */\n", i=0;
  for(const cl of found){
    if(/(link|edge|conn|flow|arr|arrow|line|path|stroke|axis|grid|rule|divider|branch|joint|wire)/i.test(cl)){
      css+=`svg .${cl}{fill:none;stroke:#9b978e;stroke-width:1.5}\n`;
    }else if(/^c-/i.test(cl)){
      const col=FALLBACK_PALETTE[i++%FALLBACK_PALETTE.length];
      css+=`svg .${cl},svg .${cl} *{fill:${col};stroke:#cfcabf}\n`;
    }

  }

}

function inlineSvgComputedStyles(src, dst){
  const props=[
    "fill","stroke","stroke-width","stroke-linecap","stroke-linejoin","stroke-miterlimit",
    "stroke-dasharray","stroke-dashoffset","opacity","fill-opacity","stroke-opacity",
    "font-family","font-size","font-weight","font-style","text-anchor","dominant-baseline",
    "paint-order","vector-effect","color","display","visibility","background","background-color",
    "border","border-radius","box-shadow","padding","margin","line-height"
  ];
  const srcNodes=[src,...src.querySelectorAll("*")];
  const dstNodes=[dst,...dst.querySelectorAll("*")];
  for(let i=0;i<srcNodes.length&&i<dstNodes.length;i++){
    const s=srcNodes[i], d=dstNodes[i], win=s.ownerDocument&&s.ownerDocument.defaultView||window, cs=win.getComputedStyle(s);
    for(const p of props){

    if((d.tagName||"").toLowerCase()==="text" && !d.style.fill){

    }
  }

function svgToPng(svgEl,name){
  const clone=svgEl.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  inlineSvgComputedStyles(svgEl, clone);
  const box=svgEl.getBoundingClientRect();
  const vb=(clone.getAttribute("viewBox")||"").trim().split(/\s+/).map(Number);
  let w=Math.ceil(box.width||svgEl.clientWidth||svgEl.getAttribute("width")||vb[2]||1000);
  let h=Math.ceil(box.height||svgEl.clientHeight||svgEl.getAttribute("height")||vb[3]||700);
  w=Math.max(1,Math.min(w,4000)); h=Math.max(1,Math.min(h,4000));
  clone.setAttribute("width",w); clone.setAttribute("height",h);
  const svg=new XMLSerializer().serializeToString(clone);
  const img=new Image();
  const url=URL.createObjectURL(new Blob([svg],{type:"image/svg+xml;charset=utf-8"}));
  img.onload=()=>{
    const scale=Math.min(2,4000/Math.max(w,h));
    const canvas=document.createElement("canvas"); canvas.width=Math.round(w*scale); canvas.height=Math.round(h*scale);
    const ctx=canvas.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    canvas.toBlob(b=>{ if(b)downloadBlob(b,safeFileName(name,"png")); URL.revokeObjectURL(url); },"image/png");
  };
  img.onerror=()=>{ URL.revokeObjectURL(url); downloadBlob(new Blob([svg],{type:"image/svg+xml"}),safeFileName(name,"svg")); };
  img.src=url;
}

  return `<div class="uploads"><div class="uploadhd">📥 用户上传（${ups.length}）</div>${rows}</div>`;

function renderSkillTags(ups){

function renderFiles(files){

function renderThinkingBlock(text, index, total, title){
  const multi=total>1;
  const label=title?`${esc(title)}${multi?` · ${index}/${total}`:""}`:(multi?`思考过程 ${index}/${total}`:"思考过程");
  return `<details class="think">
    <summary>💭 ${label}（默认隐藏，点击展开）</summary>
    <div class="thinkbody">${hl(md(text),q)}</div>
  </details>`;
}
function renderMessageFlow(parts,human){
  const flow=(parts.flow&&parts.flow.length)?parts.flow:[];
  const total=flow.filter(x=>x&&x.type==="thinking").length || ((parts.thoughts&&parts.thoughts.length)||0);
  let seen=0, html="";
  if(flow.length){
    for(const seg of flow){
      if(!seg)continue;
      if(seg.type==="thinking"){
        if(!seg.text)continue;
        if(!human)html+=renderThinkingBlock(seg.text,++seen,total,seg.title||"");
      }else if(seg.type==="text"){
        if(!seg.text)continue;
        html+=citeChips(hl(md(seg.text),q));
      }else if(seg.type==="visual"&&seg.visual){
        html+=renderVisual(seg.visual);
      }
    }
    return html;
  }
  const thoughts=(parts.thoughts&&parts.thoughts.length)?parts.thoughts:(parts.thinking?[parts.thinking]:[]);
  if(!human)html+=thoughts.map((t,i)=>renderThinkingBlock(t,i+1,thoughts.length,"")).join("");
  if(parts.text)html+=citeChips(hl(md(parts.text),q));
  return html;
}

function hostOf(u){try{return new URL(u).hostname.replace(/^www\./,"")}catch(e){return ""}}
function renderSearches(searches){
  if(!searches||!searches.length)return "";
  const queries=searches.filter(s=>s.type==="query").map(s=>s.query);
  // dedupe result links by url
  const seen=new Set(), results=[];
  for(const s of searches){ if(s.type==="result"){const k=s.url||s.title; if(!seen.has(k)){seen.add(k);results.push(s)} } }
  const qLabel = queries.length ? esc(queries.join(" · ")) : "网页搜索";
  const head = `🔍 搜索了网页${results.length?`（${results.length} 个来源）`:""}`;
  const qrow = queries.length ? `<div class="srchq">搜索词：${qLabel}</div>` : "";
  const rows = results.map(r=>{
    const host=hostOf(r.url);
    return r.url
      ? `<a class="srchrow" href="${esc(r.url)}" target="_blank" rel="noopener"><span class="srcht">${esc(r.title)}</span><span class="srchh">${esc(host)}</span></a>`
      : `<div class="srchrow"><span class="srcht">${esc(r.title)}</span></div>`;
  }).join("");
  return `<details class="searches"><summary>${head}</summary><div class="srchbody">${qrow}${rows}</div></details>`;
}

// Switch which sibling (edit/regeneration) is shown at a branch point, then re-render.
function switchBranch(parentUuid, idx, ev){
  const thread=$("#thread");
  const oldTop=thread?thread.scrollTop:0;
  const btn=ev&&ev.target?ev.target:null;
  const oldMsg=btn&&btn.closest?btn.closest(".msg"):null;
  const oldOffset=(thread&&oldMsg)?(oldMsg.getBoundingClientRect().top-thread.getBoundingClientRect().top):null;
  BRANCH_CHOICES[parentUuid]=idx;
  renderConv(sel,{preserveScroll:true, anchorParent:parentUuid, oldTop, oldOffset}); // re-render in place, keeping all branch choices
}
function openConv(i,userInitiated){
  if(sel!==i) BRANCH_CHOICES={}; // new conversation: reset branch selections
  renderConv(i,userInitiated);
}
function renderConv(i,userInitiated){
  const opts=(userInitiated&&typeof userInitiated==="object")?userInitiated:{};
  userInitiated=!!(userInitiated&&typeof userInitiated!=="object");
  if(sel!==i) BRANCH_CHOICES={}; // new conversation: reset branch selections
  sel=i; const c=DATA[i];
  // is this conversation part of the currently-expanded project's sublist?
  const inSelProj = selProj!=null && PROJECTS[selProj] &&
    convsForProject(PROJECTS[selProj]).some(x=>x._i===i);
  // expand the owning section only when the user actively picked an item, so the
  // three sections stay collapsed on first load as designed
  if(userInitiated){
    const secName = inSelProj ? "projects" : (c._design?"design":"chats");
    const ownSec=$("#sec-"+secName);
    if(ownSec && ownSec.classList.contains("closed")){ ownSec.classList.add("open"); ownSec.classList.remove("closed"); }
  }
  $("#empty").classList.add("hide"); $("#convwrap").classList.remove("hide");
  $("#convwrap").classList.remove("projmode");        // showing a chat, not the project page
  if(!inSelProj) selProj=null;                        // leaving project context entirely
  $("#convtitle").textContent=convTitle(c);
  const n=convDisplayMsgCount(c);
  $("#convmeta").innerHTML=[
    convModel(c)?`模型：${esc(convModel(c))}`:"",
    `创建：${fmt(convCreated(c))}`,
    `更新：${fmt(convUpdated(c))}`,
    `${n} 条消息`
  ].filter(Boolean).map(esc=>`<span>${esc}</span>`).join("");
  clearFileStore(); // reset per-conversation file store
  for(const k in MSGTEXT)delete MSGTEXT[k]; _mid=0; // reset per-conversation copy store
  if($("#csearchin")){$("#csearchin").value="";} CSEARCH={matches:[],idx:-1}; if($("#csearchcount"))$("#csearchcount").textContent="";
  const path = activePath(c, BRANCH_CHOICES).filter(msgHasRenderableContent);
  // reconstruct file contents across the whole conversation (handles cp + patch chains
  // where the deliverable isn't written directly via create_file)
  const fileChain = buildFileChain(c);
  $("#thread").innerHTML = path.map(m=>{
    const human=msgSender(m).startsWith("h")||msgSender(m)==="user";
    const parts=msgParts(m);
    const body=renderMessageFlow(parts,human);
    const allUploads=msgUploads(m);
    const uploads=renderUploads(allUploads);
    const skillTags=renderSkillTags(allUploads);
    const vis = parts.visuals.filter(v=>!v._inFlow).map(renderVisual).join("");
    // backfill any file whose content msgParts couldn't recover, using the chain
    for(const f of parts.files){
      if(f.content==null){
        const hit=fileChain[f.path]!=null?fileChain[f.path]
                 :fileChain[absPath(f.path)]!=null?fileChain[absPath(f.path)]
                 :fileChain[absPath(f.name)];
        if(hit!=null)f.content=hit;
      }
    }
    const fileCards = renderFiles(parts.files);
    const searchPanel = !human ? renderSearches(parts.searches) : "";
    const toolsLine = (parts.tools && parts.tools.length)
      ? `<details class="toolacts"><summary>🔧 ${parts.tools.length} 个工具操作（创建/编辑文件等，点击展开）</summary><div class="toolbody">${
          parts.tools.map(t=>`<div class="toolrow"><span class="tname">${esc(t.label)}</span>${t.detail?`<span class="tdet">${esc(t.detail)}</span>`:""}</div>`).join("")
        }</div></details>`
      : "";
    // branch navigator: when this message is one of several edits/regenerations
    const br = m._branch;
    const brNav = br
      ? `<span class="branchnav" title="这条消息有多个版本（你当时编辑或重新生成过），用箭头切换；切换后下方的后续对话也会跟着变成该版本的分支">
          <span class="brlabel">${human?'此处有多个提问版本':'此处有多个回答版本'}</span>
          <button class="brbtn" onclick="switchBranch('${br.parent}',${br.index-1},event)" ${br.index<=0?'disabled':''}>‹</button>
          <span class="brcount">${br.index+1}/${br.count}</span>
          <button class="brbtn" onclick="switchBranch('${br.parent}',${br.index+1},event)" ${br.index>=br.count-1?'disabled':''}>›</button>
        </span>`
      : "";
    const brBanner = br
      ? `<div class="brbanner">🔀 这是第 <b>${br.index+1}</b> / ${br.count} 个版本${br.index===br.count-1?'（最新）':''}，用右上角的 ‹ › 可切换其它版本，后续对话会随之改变</div>`
      : "";
    // copy button: stash the message's plain text (citation markers stripped) so it can
    // be copied to the clipboard.
    const cid="m"+(_mid++);
    MSGTEXT[cid]=(parts.text||"").replace(/\u0001CITE.*?\u0002.*?\u0003/g,"");
    const copyBtn=`<button class="copybtn" onclick="copyMsg('${cid}',this)" title="复制这条消息">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span class="copytxt">复制</span></button>`;
    return `<div class="msg ${human?'human':''}" data-msg-uuid="${esc(m.uuid||"")}" data-branch-parent="${br?esc(br.parent):""}">
      <div class="who">${human?'你':'Claude'}<span class="ts">${fmt(pick(m,["created_at","create_time","timestamp"]))}</span>${brNav}</div>
      <div class="bubble">${brBanner}${searchPanel}${uploads}${body}${skillTags}${vis}${fileCards}${toolsLine}
      </div>
      <div class="msgactions">${copyBtn}</div></div>`;
  }).join("");
  // render mermaid diagrams + size html iframes
  try{
    if(window.mermaid){
      mermaid.initialize({startOnLoad:false,securityLevel:"loose",theme:"neutral"});
      const nodes=$("#thread").querySelectorAll(".mermaid");
      if(nodes.length)mermaid.run({nodes}).catch(()=>{});
    }
  }catch(e){}
  autosizeIframes($("#thread"));
  if(opts.preserveScroll){
    const thread=$("#thread");
    let restored=false;
    if(thread&&opts.anchorParent){
      const anchor=thread.querySelector(`.msg[data-branch-parent="${cssEsc(opts.anchorParent)}"]`);
      if(anchor&&opts.oldOffset!=null){
        thread.scrollTop += anchor.getBoundingClientRect().top-thread.getBoundingClientRect().top-opts.oldOffset;
        restored=true;
      }
    }
    if(!restored&&thread)thread.scrollTop=opts.oldTop||0;
  }else{
    $("#thread").scrollTop=0;
  }
  if(window.__updScrollNav)window.__updScrollNav(); // refresh top/bottom button state
  drawList();
  renderProjects();   // keep project sublist highlight/expansion in sync
  $("#sidebar").classList.remove("show");
}

// Decide what to do with a picked/dropped File: a .zip export is unpacked in the
// browser (no manual extraction needed) and every relevant JSON inside it is fed to
// ingest(); a plain .json is ingested directly.
function isZipFile(f){
  return /\.zip$/i.test(f.name) || f.type==="application/zip" || f.type==="application/x-zip-compressed";
}
async function loadZip(file){
  if(typeof JSZip==="undefined"){ alert("ZIP 解析库未能加载，请检查网络后重试，或先手动解压再拖入 .json。"); return; }
  clearUploadStore();
  let zip;
  try{ zip = await JSZip.loadAsync(file); }
  catch(e){ alert("无法读取该 ZIP 文件：\n"+e.message); return; }
  // Collect every .json entry. We want conversations.json + each project file. Other
  // JSON (users.json etc.) is harmless — ingest() classifies and ignores non-matching.
  const entries = [];
  const assetEntries = [];
  zip.forEach((path, entry)=>{
    if(entry.dir) return;
    if(/(^|\/)__MACOSX\//.test(path)) return; // macOS archive cruft
    if(/\.(png|jpe?g|gif|webp|bmp|svg|heic|tiff?)$/i.test(path)){
      assetEntries.push({path, entry, base: path.split("/").pop().toLowerCase()});
      return;
    }
    if(!/\.json$/i.test(path)) return;
    entries.push({path, entry, base: path.split("/").pop().toLowerCase()});
  });
  if(!entries.length){ alert("这个 ZIP 里没有找到任何 .json 文件。\n请确认拖入的是 Claude 导出的数据包。"); return; }
  for(const it of assetEntries){
    try{
      const raw=await it.entry.async("blob");
      const blob=raw.type?raw:new Blob([raw],{type:mimeFor(it.path)});
      rememberUploadAsset(it.path,blob);
    }catch(e){}
  }
  // Load conversations.json LAST so projects are registered first; that way the
  // "projects loaded, now drop conversations" hint never flashes and the first
  // conversation auto-opens with project context already present.
  entries.sort((a,b)=>{
    const ac=a.base==="conversations.json", bc=b.base==="conversations.json";
    if(ac!==bc) return ac?1:-1;            // conversations.json to the end
    const ap=/project/.test(a.path), bp=/project/.test(b.path);
    if(ap!==bp) return ap?-1:1;            // project files first
    return a.path.localeCompare(b.path);
  });
  let ok=0;
  for(const it of entries){
    let text;
    try{ text = await it.entry.async("string"); }catch(e){ continue; }
    try{ ingest(text, {silent:true}); ok++; }catch(e){ /* skip unparseable members */ }
  }
  if(!ok) alert("ZIP 已读取，但其中的 JSON 都无法解析为对话或项目。");
}
function handleFile(f){
  if(!f) return;
  if(/^image\//i.test(f.type)||/\.(png|jpe?g|gif|webp|bmp|svg|heic|tiff?)$/i.test(f.name||"")){
    rememberUploadAsset(f.name,f);
    if(sel!=null)renderConv(sel);
    return;
  }
  if(isZipFile(f)){ loadZip(f); return; }
  const r=new FileReader(); r.onload=()=>ingest(r.result); r.readAsText(f);
}

/* ---------- in-conversation search ---------- */
function clearCSearch(){
  // unwrap existing highlight marks
  const thread=$("#thread");
  thread.querySelectorAll("mark.csearch").forEach(mk=>{
    const tx=document.createTextNode(mk.textContent); mk.parentNode.replaceChild(tx,mk); 
  });
  thread.normalize&&thread.normalize();
  CSEARCH={matches:[],idx:-1}; $("#csearchcount").textContent="";
}
function runCSearch(){
  clearCSearch();
  const term=($("#csearchin").value||"").trim();
  if(!term){return;}
  const thread=$("#thread");
  const re=new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");
  // walk text nodes inside bubbles, wrap matches in <mark class="csearch">
  const walker=document.createTreeWalker(thread,NodeFilter.SHOW_TEXT,{
    acceptNode(n){
      if(!n.nodeValue.trim())return NodeFilter.FILTER_REJECT;
      // skip inside the search bar / scripts / existing marks
      let p=n.parentNode;
      while(p&&p!==thread){ const tg=(p.tagName||"").toLowerCase();
        if(tg==="script"||tg==="style")return NodeFilter.FILTER_REJECT; p=p.parentNode; }
      return re.test(n.nodeValue)?NodeFilter.FILTER_ACCEPT:NodeFilter.FILTER_REJECT;
    }
  });
  const targets=[]; let nn; while(nn=walker.nextNode())targets.push(nn);
  for(const node of targets){
    re.lastIndex=0; const text=node.nodeValue; const frag=document.createDocumentFragment();
    let last=0,m;
    while((m=re.exec(text))){
      if(m.index>last)frag.appendChild(document.createTextNode(text.slice(last,m.index)));
      const mk=document.createElement("mark"); mk.className="csearch"; mk.textContent=m[0];
      frag.appendChild(mk); last=m.index+m[0].length;
      if(m[0].length===0)re.lastIndex++;
    }
    if(last<text.length)frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag,node);
  }
  CSEARCH.matches=Array.from(thread.querySelectorAll("mark.csearch"));
  if(CSEARCH.matches.length){ CSEARCH.idx=0; focusMatch(0); }
  else { $("#csearchcount").textContent="0/0"; }
}
function focusMatch(i){
  if(!CSEARCH.matches.length)return;
  CSEARCH.idx=(i+CSEARCH.matches.length)%CSEARCH.matches.length;
  CSEARCH.matches.forEach((mk,j)=>mk.classList.toggle("cur",j===CSEARCH.idx));
  const cur=CSEARCH.matches[CSEARCH.idx];
  cur.scrollIntoView({behavior:"smooth",block:"center"});
  $("#csearchcount").textContent=(CSEARCH.idx+1)+"/"+CSEARCH.matches.length;
}
$("#csearchbtn").addEventListener("click",runCSearch);
$("#csearchin").addEventListener("keydown",e=>{
  if(e.key==="Enter"){ e.preventDefault();
    if(CSEARCH.matches.length && CSEARCH.idx>=0) focusMatch(CSEARCH.idx+1); else runCSearch(); }
});
$("#cprev").addEventListener("click",()=>focusMatch(CSEARCH.idx-1));
$("#cnext").addEventListener("click",()=>focusMatch(CSEARCH.idx+1));

function exportMarkdown(){
  if(sel==null||sel<0||!DATA[sel])return;
  const c=DATA[sel];
  const path=activePath(c, BRANCH_CHOICES).filter(msgHasRenderableContent);
  let md="# "+(convTitle(c))+"\n\n";
  const meta=[convModel(c)?"模型: "+convModel(c):"","创建: "+fmt(convCreated(c)),"更新: "+fmt(convUpdated(c))].filter(Boolean);
  md+="> "+meta.join(" · ")+"\n\n---\n\n";
  for(const m of path){
    const human=msgSender(m).startsWith("h")||msgSender(m)==="user";
    const p=msgParts(m);
    md+="## "+(human?"🧑 你":"🤖 Claude")+"  \n";
    md+="*"+fmt(pick(m,["created_at","create_time","timestamp"]))+"*\n\n";
    // clean text: strip citation markers but keep the URL inline as a footnote-ish link
    let txt=(p.text||"").replace(/\u0001CITE(.*?)\u0002(.*?)\u0003/g,(_,u,t)=>{
      u=decodeURIComponent(u); return u?` [来源](${u})`:""; });
    if(txt)md+=txt+"\n\n";
    if(p.searches&&p.searches.length){
      const res=p.searches.filter(s=>s.type==="result");
      if(res.length){ md+="**🔍 搜索来源:**\n"; res.forEach(r=>{md+="- ["+(r.title||r.url)+"]("+r.url+")\n"}); md+="\n"; }
    }
    if(p.files&&p.files.length){ md+="**📎 生成文件:** "+p.files.map(f=>f.name).join("、")+"\n\n"; }
    md+="---\n\n";
  }
  const blob=new Blob([md],{type:"text/markdown;charset=utf-8"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=u; a.download=(convTitle(c).replace(/[\/\\:*?"<>|]/g,"_").slice(0,50)||"conversation")+".md";
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),4000);
}

/* ---------- statistics page ---------- */
function computeStats(){
  const convs=DATA.filter(convHasMessages);
  let nmsg=0, chars=0;
  const daily={}, weekly={}, hourly=new Array(24).fill(0), weekday=new Array(7).fill(0);
  let searches=0, files=0, visuals=0, thinks=0;
  const convLen=[]; const words={};
  // new aggregates
  let humanMsgs=0, asstMsgs=0, humanChars=0, asstChars=0;
  let sumHumanLen=0, sumAsstLen=0; // for average turn length (chars)
  const models={};                 // model slug -> conversation count
  const depthBuckets={"1-5":0,"6-15":0,"16-30":0,"31-50":0,"50+":0};
  const daySet=new Set();           // distinct active days, for streak calc
  // Chinese + English tokenizer (very lightweight): pull CJK bigrams + ascii words,
  // drop common stopwords so the cloud is meaningful.
  const stop=new Set("的了是我你他她它在和与及或而把被让从向对为以于之也都很就还又再不没有这那个们吧吗呢啊呀如果因为所以但是然后就是可以这个那个一个一下一种这种什么怎么如何the and for you are that this with have not but can will your what how".split(/\s+/));
  const stopCJK=new Set(["的","了","是","我","你","他","她","它","在","和","与","及","或","而","把","被","让","从","对","为","以","于","也","都","很","就","还","又","再","不","没","有","这","那","个","们","吧","吗","呢","啊","如果","因为","所以","但是","然后","就是","可以","这个","那个","一个","一下","什么","怎么","如何","我们","你们","他们","就是","这样","那样","一些","这些","那些","知道","可能","应该","需要","或者","比如","已经","还是"]);
  for(const c of convs){
    const path=activePath(c, {}).filter(msgHasRenderableContent); // default branch path for stats
    convLen.push({name:convTitle(c), n:path.length, uuid:c.uuid, i:DATA.indexOf(c)});
    // depth bucket per conversation
    const dl=path.length;
    if(dl<=5)depthBuckets["1-5"]++; else if(dl<=15)depthBuckets["6-15"]++;
    else if(dl<=30)depthBuckets["16-30"]++; else if(dl<=50)depthBuckets["31-50"]++; else depthBuckets["50+"]++;
    // model attribution (per conversation)
    const mdl=convModel(c)||"未知";
    models[mdl]=(models[mdl]||0)+1;
    for(const m of path){
      nmsg++;
      const p=msgParts(m);
      const txt=p.text||""; chars+=txt.length;
      const human=msgSender(m).startsWith("h");
      if(human){humanMsgs++; humanChars+=txt.length; sumHumanLen+=txt.length;}
      else{asstMsgs++; asstChars+=txt.length; sumAsstLen+=txt.length;}
      if(p.searches&&p.searches.length)searches+=p.searches.filter(s=>s.type==="result").length;
      if(p.files)files+=p.files.length;
      if(p.visuals)visuals+=p.visuals.length;
      if(p.thinking)thinks++;
      const ts=pick(m,["created_at","create_time","timestamp"]);
      if(ts){const d=new Date(ts); if(!isNaN(d)){
        const day=ts.slice(0,10); daily[day]=(daily[day]||0)+1; daySet.add(day);
        hourly[d.getHours()]++;
        weekday[d.getDay()]++;        // 0=Sun … 6=Sat
        const wk=day.slice(0,7); weekly[wk]=(weekly[wk]||0)+1;
      }}
      // word counting only on human+assistant text
      // ascii words
      (txt.toLowerCase().match(/[a-z][a-z0-9\-]{2,}/g)||[]).forEach(w=>{ if(!stop.has(w))words[w]=(words[w]||0)+1; });
      // CJK bigrams
      const cjk=txt.match(/[\u4e00-\u9fa5]+/g)||[];
      for(const seg of cjk){ for(let k=0;k+2<=seg.length;k++){ const bg=seg.slice(k,k+2);
        if(!stopCJK.has(bg))words[bg]=(words[bg]||0)+1; } }
    }
  }
  const dates=Object.keys(daily).sort();
  // peak hour
  let peakH=0; for(let h=0;h<24;h++)if(hourly[h]>hourly[peakH])peakH=h;
  // peak weekday
  let peakW=0; for(let w=0;w<7;w++)if(weekday[w]>weekday[peakW])peakW=w;
  // longest active streak (consecutive calendar days)
  const sortedDays=[...daySet].sort();
  let curStreak=0, maxStreak=0, prev=null;
  for(const ds of sortedDays){
    if(prev){ const diff=(new Date(ds)-new Date(prev))/86400000;
      curStreak = diff===1 ? curStreak+1 : 1;
    } else curStreak=1;
    if(curStreak>maxStreak)maxStreak=curStreak; prev=ds;
  }
  const topWords=Object.entries(words).filter(([w,n])=>n>=3).sort((a,b)=>b[1]-a[1]).slice(0,50);
  const topConv=convLen.slice().sort((a,b)=>b.n-a.n).slice(0,12);
  const modelPairs=Object.entries(models).sort((a,b)=>b[1]-a[1]);
  return {nconv:convs.length, nmsg, chars, daily, dates, weekly, hourly, weekday, peakH, peakW,
    searches, files, visuals, thinks, topWords, topConv, avgLen: convs.length?(nmsg/convs.length):0,
    humanMsgs, asstMsgs, humanChars, asstChars,
    avgHumanLen: humanMsgs?(sumHumanLen/humanMsgs):0, avgAsstLen: asstMsgs?(sumAsstLen/asstMsgs):0,
    models:modelPairs, depthBuckets, maxStreak, activeDays:daySet.size};
}
function svgLineChart(pairs, label){
  // pairs: [[xLabel, value], ...]
  if(!pairs.length)return "<div style='color:var(--muted);font-size:13px'>暂无数据</div>";
  const W=900,H=200,pad=34;
  const vals=pairs.map(p=>p[1]); const max=Math.max(...vals,1);
  const n=pairs.length;
  const x=i=>pad+(n<=1?0:i*(W-2*pad)/(n-1));
  const y=v=>H-pad-(v/max)*(H-2*pad);
  let pts=pairs.map((p,i)=>x(i)+","+y(p[1])).join(" ");
  let area="M"+x(0)+","+(H-pad)+" L"+pairs.map((p,i)=>x(i)+","+y(p[1])).join(" L")+" L"+x(n-1)+","+(H-pad)+" Z";
  // x labels: show ~8 evenly
  const step=Math.max(1,Math.ceil(n/8));
  let xl=""; for(let i=0;i<n;i+=step){ xl+=`<text x="${x(i)}" y="${H-8}" font-size="10" fill="#888" text-anchor="middle">${pairs[i][0].slice(5)}</text>`; }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <path d="${area}" fill="#cc6b3f22"/>
    <polyline points="${pts}" fill="none" stroke="#cc6b3f" stroke-width="2"/>
    ${pairs.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p[1])}" r="2.5" fill="#cc6b3f"/>`).join("")}
    <text x="${pad}" y="16" font-size="11" fill="#888">峰值 ${max}</text>
    ${xl}
  </svg>`;
}
function barChart(pairs, fmtv){
  const max=Math.max(...pairs.map(p=>p[1]),1);
  return pairs.map(p=>`<div class="barrow"><span class="bl">${esc(p[0]+"")}</span>
    <span class="bt"><span class="bf" style="width:${(p[1]/max*100).toFixed(1)}%"></span></span>
    <span class="bv">${fmtv?fmtv(p[1]):p[1]}</span></div>`).join("");
}
// Compact SVG donut chart with a centered total and a legend list.
function donutChart(pairs, opts){
  opts=opts||{};
  const total=pairs.reduce((s,p)=>s+p[1],0)||1;
  const palette=["#cc6b3f","#2563eb","#3c8a4e","#b8860b","#8e44ad","#16a085","#c0392b","#5d6d7e","#d35400","#7f8c8d"];
  const R=52, C=2*Math.PI*R; let off=0;
  const arcs=pairs.map((p,i)=>{
    const frac=p[1]/total, len=frac*C;
    const seg=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${palette[i%palette.length]}" stroke-width="20"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 70 70)"/>`;
    off+=len; return seg;
  }).join("");
  const legend=pairs.map((p,i)=>`<div class="lgrow"><span class="lgdot" style="background:${palette[i%palette.length]}"></span>
    <span class="lgname" title="${esc(p[0]+"")}">${esc(opts.short?opts.short(p[0]):p[0]+"")}</span>
    <span class="lgval">${p[1]} · ${(p[1]/total*100).toFixed(0)}%</span></div>`).join("");
  return `<div class="donutwrap"><svg viewBox="0 0 140 140" class="donutsvg">${arcs}
    <text x="70" y="66" text-anchor="middle" font-size="22" font-weight="700" fill="var(--ink)">${opts.center!=null?opts.center:total}</text>
    <text x="70" y="84" text-anchor="middle" font-size="10" fill="var(--muted)">${esc(opts.centerLabel||"总计")}</text></svg>
    <div class="lglist">${legend}</div></div>`;
}
// Single horizontal split bar (e.g. human vs assistant) with inline labels.
function splitBar(segs){
  const total=segs.reduce((s,x)=>s+x.v,0)||1;
  const bar=segs.map(x=>`<span class="sbseg" style="width:${(x.v/total*100).toFixed(2)}%;background:${x.color}" title="${esc(x.label)}: ${x.v}"></span>`).join("");
  const leg=segs.map(x=>`<span class="sblg"><span class="lgdot" style="background:${x.color}"></span>${esc(x.label)} <b>${(x.v/total*100).toFixed(1)}%</b> <span style="color:var(--muted)">(${x.disp!=null?x.disp:x.v})</span></span>`).join("");
  return `<div class="splitbar">${bar}</div><div class="splitleg">${leg}</div>`;
}
// 7×N weekday heatmap is overkill for this data; show a single-row weekday intensity strip.
function weekdayStrip(weekday){
  const names=["周日","周一","周二","周三","周四","周五","周六"];
  const max=Math.max(...weekday,1);
  return `<div class="wdstrip">${weekday.map((v,i)=>{
    const t=v/max; const bg=`rgba(204,107,63,${(0.12+0.88*t).toFixed(3)})`;
    return `<div class="wdcell" title="${names[i]}：${v} 条消息"><div class="wdbox" style="background:${bg};color:${t>0.55?'#fff':'var(--ink)'}">${v}</div><div class="wdlbl">${names[i]}</div></div>`;
  }).join("")}</div>`;
}

  });

// Friendly short model label for the legend (keeps the donut tidy).
function prettyModel(slug){
  const s=(slug+"").toLowerCase();
  if(/opus/.test(s))return "Opus"+(/4-?8/.test(s)?" 4.8":/4-?5/.test(s)?" 4.5":/4-?1/.test(s)?" 4.1":"");
  if(/sonnet/.test(s))return "Sonnet"+(/4-?6/.test(s)?" 4.6":/4-?5/.test(s)?" 4.5":/3-?7/.test(s)?" 3.7":"");
  if(/haiku/.test(s))return "Haiku"+(/4-?5/.test(s)?" 4.5":"");
  if(/mythos/.test(s))return "Mythos";
  if(/fable/.test(s))return "Fable";
  if(slug==="未知"||!slug)return "未标注";
  return (slug+"").replace(/^claude-?/,"").slice(0,16);
}

}
function gotoConvFromStats(i){
  $("#statspage").classList.add("hide");
  openConv(i,true);
}
$("#statsbtn").addEventListener("click",openStats);
$("#statsback").addEventListener("click",()=>$("#statspage").classList.add("hide"));
$("#sntop").addEventListener("click",()=>$("#thread").scrollTo({top:0,behavior:"smooth"}));
$("#snbot").addEventListener("click",()=>{const t=$("#thread");t.scrollTo({top:t.scrollHeight,behavior:"smooth"})});
// dim each button when already at that end; the control is visible whenever a
// conversation is open (we re-check after layout/iframes settle so it isn't hidden
// prematurely while content height is still being computed).
(function(){
  const t=$("#thread"), top=$("#sntop"), bot=$("#snbot"), nav=$("#scrollnav"), wrap=$("#convwrap");
  function upd(){
    // hide only when no conversation is open
    const open = wrap && !wrap.classList.contains("hide");
    if(!open){ nav.style.display="none"; return; }
    nav.style.display="flex";
    const atTop=t.scrollTop<=4, atBot=t.scrollTop+t.clientHeight>=t.scrollHeight-4;
    top.classList.toggle("snoff",atTop);
    bot.classList.toggle("snoff",atBot && t.scrollHeight-t.clientHeight<=40);
  }
  t.addEventListener("scroll",upd,{passive:true});
  window.addEventListener("resize",upd);
  window.__updScrollNav=function(){ upd(); setTimeout(upd,120); setTimeout(upd,500); };
  upd();
})();
</script>
